<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- AUTH -->
        <div id="authContainer" class="auth-container">
            <div class="auth-card">
                <div class="auth-brand"><i class="fas fa-feather-alt"></i><span>Notes</span></div>
                <h2 id="authTitle">Welcome Back</h2>
                <p class="auth-subtitle">Sign in to continue</p>
                <div id="authError" class="error" style="display:none;"></div>
                <input type="email" id="emailInput" placeholder="Email">
                <input type="password" id="passwordInput" placeholder="Password">
                <button onclick="submitAuth()" id="authButton" class="btn-primary">
                    <span>Sign In</span> <i class="fas fa-arrow-right"></i>
                </button>
                <div class="divider"><span>or</span></div>
                <a href="/api/auth/google" class="google-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#4285ea" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </a>
                <div class="auth-switch" onclick="toggleAuthMode()">
                    <span id="authSwitchText">Don't have an account? <strong>Create one</strong></span>
                </div>
            </div>
        </div>

        <!-- MAIN -->
        <div id="mainApp" class="main-app">
            <aside class="sidebar">
                <div class="sidebar-brand"><i class="fas fa-feather-alt"></i><span>Notes</span></div>
                <nav class="sidebar-nav">
                    <a href="#" class="active" onclick="loadNotes()"><i class="fas fa-home"></i><span>All Notes</span></a>
                    <a href="#" onclick="exportNotes()"><i class="fas fa-download"></i><span>Export</span></a>
                    <a href="#" onclick="document.getElementById('importFile').click()"><i class="fas fa-upload"></i><span>Import</span></a>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importNotes(event)">
                </nav>
                <div class="sidebar-footer">
                    <div class="theme-selector">
                        <i class="fas fa-palette"></i>
                        <select id="themeSelect" onchange="changeTheme(this.value)">
                            <option value="forest">🌿 Forest</option>
                            <option value="ocean">🌊 Ocean</option>
                            <option value="sunset">🌅 Sunset</option>
                            <option value="midnight">🌙 Midnight</option>
                            <option value="sakura">🌸 Sakura</option>
                            <option value="neon">⚡ Neon</option>
                        </select>
                    </div>
                    <button onclick="logout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </aside>

            <main class="main-content">
                <header class="main-header">
                    <div><h1>My Notes</h1><span class="note-count" id="noteCount">0 notes</span></div>
                    <div class="user-info"><img id="userAvatar" class="user-avatar" style="display:none;"><span id="userEmail">Loading...</span></div>
                </header>

                <div class="search-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search..." onkeypress="if(event.key==='Enter') searchNotes()">
                        <button onclick="searchNotes()" class="btn-icon"><i class="fas fa-arrow-right"></i></button>
                        <button onclick="clearSearch()" class="btn-icon"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="tag-filters">
                        <span class="tag-filter-label">Tags:</span>
                        <div id="tagFilters" class="tag-cloud"></div>
                    </div>
                </div>

                <div class="add-note-section">
                    <div class="add-note-toggle" onclick="toggleAddNote()">
                        <i class="fas fa-plus-circle"></i> <span>New Note</span>
                    </div>
                    <div id="addNoteForm" class="add-note-form" style="display:none;">
                        <input type="text" id="titleInput" placeholder="Title...">
                        <textarea id="contentInput" placeholder="Write your note..."></textarea>
                        <div class="note-form-footer">
                            <input type="text" id="tagsInput" placeholder="Tags (comma-separated)">
                            <button onclick="createNote()" class="btn-primary"><i class="fas fa-plus"></i> Create</button>
                        </div>
                    </div>
                </div>

                <div id="notesList" class="notes-grid">
                    <div class="empty-state">
                        <i class="fas fa-feather-alt"></i>
                        <h3>No notes yet</h3>
                        <p>Start writing your first note</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast" class="toast" style="display:none;"></div>
    <script src="app.js"></script>
</body>
</html>
